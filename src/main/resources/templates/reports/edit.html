<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>日報編集 - 日報管理システム</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <h1>日報編集</h1>
        
        <form th:action="@{/reports/edit/{id}(id=${report.id})}" th:object="${report}" method="post">
            <div class="form-group">
                <label for="title">タイトル:</label>
                <input type="text" id="title" th:field="*{title}" class="form-control" required>
                <span class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
            </div>
            
            <div class="form-group">
                <label for="content">内容:</label>
                <textarea id="content" th:field="*{content}" class="form-control" rows="10" required></textarea>
                <span class="text-danger" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></span>
            </div>
            
            <div class="form-group">
                <label for="submissionDate">提出日:</label>
                <input type="date" id="submissionDate" th:field="*{submissionDate}" class="form-control" required>
                <span class="text-danger" th:if="${#fields.hasErrors('submissionDate')}" th:errors="*{submissionDate}"></span>
            </div>
            
            <div class="button-group">
                <button type="submit" class="btn btn-primary">更新</button>
                <a th:href="@{/reports}" class="btn btn-secondary">戻る</a>
            </div>
        </form>
    </div>
</body>
</html>
