<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>日報管理システム</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <h1>日報管理システム</h1>
        
        <div sec:authorize="!isAuthenticated()">
            <p>日報管理システムへようこそ！</p>
            <p>このシステムでは、日々の業務報告を簡単に管理することができます。</p>
            <div class="button-group">
                <a th:href="@{/auth/login}" class="btn btn-primary">ログイン</a>
                <a th:href="@{/auth/register}" class="btn btn-primary">新規登録</a>
            </div>
        </div>
        
        <div sec:authorize="isAuthenticated()">
            <p>
                ようこそ、<span th:text="${userName}"></span>さん！
            </p>
            <div class="button-group">
                <a th:href="@{/reports}" class="btn btn-primary">すべての日報</a>
                <a th:href="@{/reports/create}" class="btn btn-primary">新規作成</a>
                <a th:href="@{/users/profile}" class="btn btn-primary">プロフィール</a>
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/users}" class="btn btn-primary">ユーザー管理</a>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-primary">ログアウト</button>
                </form>
            </div>
            
            <!-- ここからの内容を追加する -->
            <h2>自分の日報一覧</h2>

            <div th:if="${#lists.isEmpty(reports)}" class="text-center">
                <p>日報がありません。</p>
            </div>

            <div th:unless="${#lists.isEmpty(reports)}" class="report-list">
                <div th:each="report : ${reports}" class="report-item">
                    <h3 th:text="${report.title}" class="report-title"></h3>
                    <div class="report-meta">
                        <span th:text="${#temporals.format(report.submissionDate, 'yyyy/MM/dd')}"></span>
                    </div>
                    <div class="button-group">
                        <a th:href="@{/reports/{id}(id=${report.id})}" class="btn btn-primary">詳細</a>
                        <a th:href="@{/reports/edit/{id}(id=${report.id})}" class="btn btn-primary">編集</a>
                        <form th:action="@{/reports/delete/{id}(id=${report.id})}" method="post" style="display: inline;">
                            <button type="submit" class="btn btn-danger" onclick="return confirm('本当に削除しますか？')">削除</button>
                        </form>
                    </div>
                </div>
            </div>
            <!-- ここまでの内容を追加する -->
        </div>
    </div>
</body>
</html>
