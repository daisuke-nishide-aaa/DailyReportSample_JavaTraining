<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>プロフィール - 日報管理システム</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <h1>プロフィール</h1>

        <div th:if="${successMessage}" class="alert alert-success">
            <span th:text="${successMessage}"></span>
        </div>

        <div class="profile-info">
            <div class="form-group">
                <label>氏名:</label>
                <div class="info-text" th:text="${user.name}"></div>
            </div>

            <div class="form-group">
                <label>メールアドレス:</label>
                <div class="info-text" th:text="${user.email}"></div>
            </div>

            <div class="form-group">
                <label>郵便番号:</label>
                <div class="info-text" th:text="${user.postalCode}"></div>
            </div>

            <div class="form-group">
                <label>住所:</label>
                <div class="info-text" th:text="${user.address}"></div>
            </div>

            <div class="button-group">
                <a th:href="@{/users/profile/edit}" class="btn btn-primary">編集</a>
                <a th:href="@{/}" class="btn btn-secondary">戻る</a>
            </div>
        </div>
    </div>
</body>
</html>
