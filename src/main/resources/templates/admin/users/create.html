<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ユーザー登録 - 日報管理システム</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <h1>ユーザー登録</h1>
        
        <form th:action="@{/admin/users/create}" th:object="${user}" method="post">
            <div class="form-group">
                <label for="name">氏名:</label>
                <input type="text" id="name" th:field="*{name}" class="form-control" required>
                <span class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
            </div>
            
            <div class="form-group">
                <label for="email">メールアドレス:</label>
                <input type="email" id="email" th:field="*{email}" class="form-control" required>
                <span class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>
            
            <div class="form-group">
                <label for="password">パスワード:</label>
                <input type="password" id="password" th:field="*{password}" class="form-control" required>
                <span class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>

            <div class="form-group">
                <label for="postalCode">郵便番号:</label>
                <input type="text" id="postalCode" th:field="*{postalCode}" class="form-control" required>
                <span class="text-danger" th:if="${#fields.hasErrors('postalCode')}" th:errors="*{postalCode}"></span>
            </div>

            <div class="form-group">
                <label for="address">住所:</label>
                <input type="text" id="address" th:field="*{address}" class="form-control" required>
                <span class="text-danger" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></span>
            </div>

            <div class="form-group">
                <label for="role">権限:</label>
                <select id="role" th:field="*{role}" class="form-control" required>
                    <option value="ROLE_USER">一般ユーザー</option>
                    <option value="ROLE_ADMIN">管理者</option>
                </select>
                <span class="text-danger" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></span>
            </div>
            
            <div class="button-group">
                <button type="submit" class="btn btn-primary">登録</button>
                <a th:href="@{/admin/users}" class="btn btn-secondary">戻る</a>
            </div>
        </form>
    </div>
</body>
</html>
